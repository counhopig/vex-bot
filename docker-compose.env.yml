version: '3.8'

services:
  vex:
    image: ${VEX_IMAGE:-ghcr.io/counhopig/vex-bot:latest}
    container_name: vex-bot
    restart: unless-stopped

    # Load environment variables from .env file
    env_file:
      - .env

    ports:
      - "${PORT:-3000}:3000"

    volumes:
      - vex-data:/home/vex/.vex
      - ./config.local.json5:/app/config.local.json5:ro

    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  vex-data:
    driver: local
