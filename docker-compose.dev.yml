version: '3.8'

services:
  vex:
    image: vex-bot:dev
    container_name: vex-bot-dev
    restart: unless-stopped

    build:
      context: .
      dockerfile: Dockerfile

    command: ["start", "--web-only"]

    environment:
      - PORT=3000
      - LOG_LEVEL=info

    ports:
      - "3000:3000"

    volumes:
      - vex-dev-data:/home/vex/.vex

    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  vex-dev-data:
    driver: local
