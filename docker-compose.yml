version: '3.8'

services:
  vex:
    image: ghcr.io/counhopig/vex-bot:latest
    container_name: vex-bot
    restart: unless-stopped

    # Command to start (use --web-only for web-only mode, remove it for full mode).
    # --host 0.0.0.0 binds on all interfaces *inside* the isolated container so
    # the published port below can reach it; the default bind (127.0.0.1) is
    # loopback-only and would make the container unreachable. Real exposure is
    # controlled by the host-side port mapping.
    command: ["start", "--web-only", "--host", "0.0.0.0"]

    # Port mapping (use "127.0.0.1:3000:3000" to restrict to the local host)
    ports:
      - "3000:3000"

    # Volume mounts for persistent data and optional config
    volumes:
      - vex-data:/home/vex/.vex

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

# Named volume for persistent data
volumes:
  vex-data:
    driver: local
